<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Moodboard Clipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      padding: 16px;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .field { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #555;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 5px;
      color: #f0f0f0;
      font-size: 12px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input[type="password"] { font-family: monospace; letter-spacing: 0.03em; }
    input:focus { border-color: rgba(255,255,255,0.25); }

    button#save {
      width: 100%;
      margin-top: 4px;
      padding: 8px;
      background: #e8e0d4;
      color: #0a0a0a;
      border: none;
      border-radius: 5px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button#save:hover { opacity: 0.85; }

    .hint {
      margin-top: 12px;
      font-size: 10px;
      color: #444;
      line-height: 1.5;
    }
    .hint a {
      color: #888;
      text-decoration: none;
    }
    .hint a:hover { color: #aaa; }

    .status {
      margin-top: 8px;
      font-size: 11px;
      color: #4ade80;
      min-height: 16px;
      text-align: center;
    }

    .token-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .token-row input { flex: 1; }
    .token-toggle {
      background: none;
      border: none;
      color: #555;
      font-size: 13px;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
      flex-shrink: 0;
    }
    .token-toggle:hover { color: #888; }
  </style>
</head>
<body>
  <header>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect width="20" height="20" rx="4" fill="#1a1a1a"/>
      <text x="10" y="15" font-family="Georgia,serif" font-size="13" fill="#f0f0f0" text-anchor="middle">M</text>
    </svg>
    <h1>Moodboard Clipper</h1>
  </header>

  <div>
    <div class="field">
      <label for="appUrl">URL de votre Moodboard</label>
      <input
        id="appUrl"
        type="url"
        placeholder="https://votre-app.vercel.app"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <div class="field">
      <label for="apiToken">Token d'API</label>
      <div class="token-row">
        <input
          id="apiToken"
          type="password"
          placeholder="mb_…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="token-toggle" id="toggleToken" title="Afficher / masquer">👁</button>
      </div>
    </div>

    <button id="save">Enregistrer</button>
    <div class="status" id="status"></div>

    <p class="hint">
      Générez votre token dans <strong>Moodboard → Paramètres → Extension Chrome</strong>.
      Survolez ensuite n'importe quelle image et cliquez sur <strong>Sauvegarder</strong>.
    </p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
